<!DOCTYPE html>
<html lang="zh">
<head>
  <!-- 使用现代的charset meta标签指定字符编码 -->
  <meta charset="UTF-8" />
  <!-- 优化的viewport设置，针对不同浏览器提供更好的兼容性 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- Android状态栏背景色 - 设置为与网页背景色一致 -->
  <meta name="theme-color" content="#ffffff" />
  <!-- iOS状态栏样式 - 设置为半透明以实现沉浸式效果 -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <!-- 为Windows Mobile设备设置状态栏颜色 -->
  <meta name="msapplication-navbutton-color" content="#ffffff" />
  
  <title>电子书阅读器V0.5.9</title>
  <script src="https://cdn.jsdelivr.net/npm/jschardet@3.0.0/dist/jschardet.min.js"></script>
  <!-- IconPark图标库 -->
  <script src="https://cdn.jsdelivr.net/npm/@icon-park/svg-icons@1.3.5/dist/index.min.js"></script>
  

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- 文件输入隐藏组件 (支持批量选择) -->
  <input type="file" id="fileInput" accept=".txt" multiple style="display: none;" title="选择TXT文件" />

  <!-- 书籍缓存页面 -->
  <div id="booksPage" style="display: flex;">
    <div class="books-container">
      <div class="books-header">
        <h2 class="books-title">书架</h2>
        <div class="books-controls">
          <div class="books-search-container">
            <input type="text" id="bookSearch" placeholder="搜索书籍..." class="book-search-input">
          </div>

        </div>
      </div>
      <div class="books-content">
        <div id="booksGrid" class="books-grid">
          <!-- 书籍卡片将通过JS动态生成 -->
        </div>
      </div>
      <div id="noBooksMessage" class="no-books-message" style="display: none;">
        <div class="no-books-icon">📚</div>
        <div class="no-books-text">暂无已缓存的书籍</div>
        <button class="no-books-btn" onclick="switchToUploadPage()">添加第一本书</button>
      </div>
      <div class="books-footer">
        <div class="books-cache-info" id="booksCacheInfo">
          <span>缓存信息加载中...</span>
        </div>
        <div class="books-manage-section">
          <span class="manage-btn" onclick="openCacheManagementDialog()" title="管理">
            <i class="nav-icon" id="iconManage"></i>
            <span>文件管理</span>
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- 书籍导入检查页面 -->
  <div id="importCheckPage" style="display: none; width: 100vw; height: 100vh; overflow: hidden;">
    <div class="import-check-container">
      <div class="import-check-header">
        <button class="import-check-back-btn" onclick="switchToBooksPage()">
          <i class="nav-icon" id="iconImportBack"></i>
          <span>返回</span>
        </button>
        <h2 class="import-check-title" id="importCheckTitle">书籍导入</h2>
        <div class="import-check-actions">
          <button class="import-check-delete-btn" id="importDeleteBtn" onclick="deleteImportingBook()">
            <i class="nav-icon" id="iconImportDelete"></i>
            <span>删除</span>
          </button>
        </div>
      </div>
      <div class="import-check-content">
        <div class="import-check-section">
          <h3 class="import-check-section-title">书籍信息</h3>
          <div class="import-info-grid" id="importInfoGrid">
            <!-- 书籍信息将动态生成 -->
          </div>
        </div>
        
        <div class="import-check-section">
          <h3 class="import-check-section-title">编码检查</h3>
          <div class="encoding-check-container" id="encodingCheckContainer">
            <!-- 编码检查结果将动态生成 -->
          </div>
        </div>
        
        <div class="import-check-section">
          <h3 class="import-check-section-title">目录分卷分章检查</h3>
          <div class="directory-check-container" id="directoryCheckContainer">
            <!-- 目录检查结果将动态生成 -->
          </div>
        </div>
        
        <div class="import-check-section">
          <h3 class="import-check-section-title">目录预览</h3>
          <div class="import-directory-container" id="importDirectoryContainer">
            <!-- 目录预览将动态生成 -->
          </div>
        </div>
        
        <div class="import-check-section">
          <h3 class="import-check-section-title">工具列表</h3>
          <div class="import-tools-note" style="margin-bottom: 12px; font-size: 13px; color: var(--nav-text); line-height: 1.6;">
            如有不支持的格式，请使用工具复制结构给作者微信cwj267，1天内解决
          </div>
          <div class="import-tools-container" id="importToolsContainer">
            <button class="import-tool-btn" onclick="copyBookDirectoryStructure()">
              <i class="nav-icon" id="iconCopyFormat"></i>
              <span>复制书籍目录结构</span>
            </button>
            <button class="import-tool-btn" onclick="tryFixEncoding()">
              <i class="nav-icon" id="iconFixEncoding"></i>
              <span>尝试修复编码</span>
            </button>
          </div>
        </div>
      </div>
      <div class="import-check-footer">
        <button class="import-cancel-btn" onclick="switchToBooksPage()">取消</button>
        <button class="import-confirm-btn" id="importConfirmBtn" onclick="confirmImport()">确认导入并阅读</button>
      </div>
    </div>
  </div>

  <!-- 书籍详情页面 -->
  <div id="bookDetailPage" style="display: none; width: 100vw; height: 100vh; overflow: hidden;">
    <div class="book-detail-container">
      <div class="book-detail-header">
        <button class="book-detail-back-btn" onclick="switchToBooksPage()">
          <i class="nav-icon" id="iconDetailBack"></i>
          <span>返回</span>
        </button>
        <h2 class="book-detail-title" id="bookDetailTitle">书籍详情</h2>
        <div class="book-detail-actions">
          <button class="book-detail-read-btn" id="bookDetailReadBtn" onclick="openBookFromDetail()">
            <i class="nav-icon" id="iconDetailRead"></i>
            <span>阅读</span>
          </button>
        </div>
      </div>
      <div class="book-detail-tabs">
        <div class="book-detail-tab active" data-tab="intro" onclick="switchDetailTab('intro')">介绍</div>
        <div class="book-detail-tab" data-tab="stats" onclick="switchDetailTab('stats')">统计</div>
      </div>
      <div class="book-detail-content">
        <div class="book-detail-tab-content active" id="detailTabIntro">
          <div class="book-detail-section">
            <h3 class="book-detail-section-title">基本信息</h3>
            <div class="book-info-grid" id="bookInfoGrid">
              <!-- 书籍信息将动态生成 -->
            </div>
          </div>
          
          <div class="book-detail-section">
            <h3 class="book-detail-section-title">目录</h3>
            <div class="book-directory-container" id="bookDirectoryContainer">
              <!-- 目录将动态生成 -->
            </div>
          </div>
        </div>
        
        <div class="book-detail-tab-content" id="detailTabStats">
          <div class="book-detail-section">
            <h3 class="book-detail-section-title">阅读统计</h3>
            <div class="book-stats-container" id="bookStatsContainer">
              <!-- 统计信息将动态生成 -->
            </div>
          </div>
          
          <div class="book-detail-section">
            <h3 class="book-detail-section-title">阅读记录</h3>
            <div class="book-reading-history" id="bookReadingHistory">
              <!-- 阅读记录将动态生成 -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 主阅读器 -->
  <div id="appContainer">
    <!-- 顶部导航栏 -->
    <div class="top-nav">
      <div class="nav-row">
        <div class="nav-col" onclick="toggleDirectory()">
          <div class="nav-btn" id="navDirectory" title="目录">
            <i class="nav-icon" id="iconDirectory"></i>
            <span class="nav-text">目录</span>
          </div>
        </div>
        <div class="nav-center">
          <div class="nav-btn nav-center-item active" id="navReading" data-mode="reading" onclick="switchToReading()" title="阅读">
            <i class="nav-icon" id="iconReading"></i>
            <span class="nav-text">阅读</span>
          </div>
          <div class="nav-btn nav-center-item" id="navSearch" data-mode="search" onclick="toggleSearchPage()" title="搜索">
            <i class="nav-icon" id="iconSearch"></i>
            <span class="nav-text">搜索</span>
          </div>
        </div>
        <div class="nav-col" onclick="toggleMore()">
          <div class="nav-btn inactive" id="navMore" title="更多">
            <i class="nav-icon" id="iconMore"></i>
            <span class="nav-text">更多</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 主内容区域 -->
    <div class="main-content">
      <!-- 左侧目录栏 -->
      <div class="sidebar-left" id="sidebarLeft">
        <div class="sidebar-header" onclick="switchToBooksPage()" style="cursor: pointer;">
          <div class="book-title-row">
            <span class="book-title" id="bookTitle" style="font-weight: 700;"></span>
            <span id="currentFileName" style="margin-left: 8px; color: var(--secondary-text-color); font-size: 13px;"></span>
            <button class="book-reupload" onclick="switchToBooksPage()" title="返回">
              <i class="nav-icon" id="iconBack"></i>
            </button>
        </div>
      </div>
        <div class="progress-section">
          <div class="progress-header">
            <div class="progress-text">阅读进度 <span id="progressPercent">10%</span></div>
            <div class="progress-detail"><span id="progressText">100 / 1000字</span></div>
          </div>
          <div class="progress-bar">
        <div class="progress-fill" id="progressBar"></div>
        <div class="progress-tooltip" id="progressTooltip">50%</div>
      </div>
          <!-- 回到当前章节按钮 - 移动到阅读进度卡片下方 -->
          <button id="backToCurrentBtn" class="back-to-current-btn">
            <i class="nav-icon" id="iconBackToChapter"></i>
            <span>回到当前章节</span>
          </button>
        </div>
        <div class="directory-list" id="directoryList">
          <!-- 目录内容将通过JS动态生成 -->
        </div>
      </div>

      <!-- 中间阅读区域 -->
      <div class="reading-area">
        <div class="chapter-content" id="chapterContent" ondblclick="toggleScrollingMode()">
          <!-- 章节内容将通过JS动态生成 -->
        </div>
        <div class="chapter-footer">
          <div class="footer-content footer-flex">
            <div class="footer-col nav-btn" onclick="goPrev()" title="上一章">
              <i class="nav-icon" id="iconPrev"></i>
              <span class="nav-text">上一章</span>
            </div>
            <div class="footer-col footer-center" id="chapterCounter">
              <input id="chapterJumpInput" type="number" min="0" class="chapter-jump-input" />
              <button id="chapterJumpBtn" class="chapter-jump-go">GO</button>
            </div>
            <div class="footer-col nav-btn" onclick="goNext()" title="下一章">
              <i class="nav-icon" id="iconNext"></i>
              <span class="nav-text">下一章</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 右侧功能栏 -->
      <div class="sidebar-right" id="sidebarRight">
        <div class="function-content" id="functionContent">
          <!-- 功能内容将通过JS动态生成 -->
        </div>
      </div>
    </div>
  </div>

  <!-- Toast提示容器 -->
  <div class="toast-container" id="toastContainer"></div>

    <!-- 笔记编辑分屏区域 -->
    <div id="noteSplitScreen" style="display: none; position: fixed; bottom: 0; left: 0; right: 0; max-width: 1300px; height: 300px; background-color: var(--background-color); border-top: 1px solid var(--border-color); z-index: 90; flex-direction: column; margin: 0 auto;">
      <!-- 可拖动分隔线 -->
      <div id="splitLine" style="height: 4px; background-color: var(--border-color); cursor: ns-resize; position: relative;">
        <div style="width: 40px; height: 2px; background-color: var(--accent-color); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
      </div>
      
      <!-- 隐藏的笔记数据字段 -->
      <input type="hidden" id="noteSplitId" value="">
      <input type="hidden" id="noteSplitChapterIndex" value="">
      
      <div class="note-split-body" style="flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; scrollbar-width: var(--scrollbar-width); scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);">
        <div style="margin-bottom: 16px;">
          <input type="text" id="noteSplitTitleInput" placeholder="请输入标题" style="width: 100%; padding: 12px; box-sizing: border-box; background-color: rgba(255, 255, 255, 0.05); border: 1px solid transparent; border-radius: 8px; color: var(--text-color); font-size: 14px; margin-bottom: 16px; transition: all 0.2s ease;">
          <textarea id="noteSplitContent" placeholder="请输入笔记内容..." rows="5" style="width: 100%; height: 200px; padding: 12px; box-sizing: border-box; background-color: rgba(255, 255, 255, 0.05); border: 1px solid transparent; border-radius: 8px; resize: none; color: var(--text-color); font-size: 14px; line-height: 1.6; transition: all 0.2s ease;"></textarea>
        </div>
        
        <div class="chapter-status-container" style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
          <div class="chapter-jump-container" style="display: flex; align-items: center; gap: 10px;">
            <label style="font-size: 14px; color: var(--text-color);"></label>
            <input type="number" id="noteSplitChapterIndexInput" min="0" max="1000" style="padding: 8px 12px; box-sizing: border-box; background-color: rgba(255, 255, 255, 0.05); border: 1px solid transparent; border-radius: 6px; color: var(--text-color); font-size: 14px; width: 70px;" placeholder="章节号">
            <button class="go-button" onclick="jumpToChapterFromNoteSplit()" style="background-color: black; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: background-color 0.2s ease;">跳转</button>
          </div>
          
          <label style="display: flex; align-items: center; cursor: pointer; font-size: 14px; color: var(--text-color);">
            <input type="checkbox" id="noteSplitIsChecked" style="margin-right: 10px; accent-color: var(--accent-color); cursor: pointer; width: 16px; height: 16px;">
            <span id="noteSplitStatusText">进行中</span>
          </label>
        </div>
      </div>
      
      <div class="note-split-footer" style="padding: 16px 20px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 12px;">
        <button class="note-split-btn danger" id="noteSplitDeleteBtn" style="display: none; margin-right: auto; background-color: var(--danger-color); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; transition: all 0.2s ease; cursor: pointer;">删除</button>
        <button class="note-split-btn" onclick="closeNoteEditDialog()" style="background-color: var(--border-color); color: var(--text-color); border: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; transition: all 0.2s ease; cursor: pointer;">取消</button>
        <button class="note-split-btn" id="noteSplitSaveBtn" style="background-color: var(--border-color); color: var(--text-color); border: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; transition: all 0.2s ease; cursor: pointer;">确认添加</button>
      </div>
      
      
    </div>
    
    
  
  
  
  <!-- 文本选择迷你菜单 -->
  <div id="selectionMenu" style="position: fixed; z-index: 1000; display: none; background: #fff; border: 1px solid #ddd; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);">
    <button class="selection-menu-btn" onclick="copySelectedText()">复制</button>
    <button class="selection-menu-btn" onclick="addNoteFromSelection()">添加笔记</button>
    <button class="selection-menu-btn" onclick="searchSelectedText()">搜索全书</button>
  </div>

  

    <script src="js/main.js"></script>
</body>
</html>
